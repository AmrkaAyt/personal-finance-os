x-service-defaults: &service-defaults
  restart: unless-stopped
  env_file:
    - ../.env

x-runtime-env: &runtime-env
  REQUEST_TIMEOUT: ${REQUEST_TIMEOUT:-10s}
  STARTUP_TIMEOUT: ${STARTUP_TIMEOUT:-45s}

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-finance}
      POSTGRES_USER: ${POSTGRES_USER:-finance}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-finance}
    ports:
      - "${POSTGRES_HOST_PORT:-5434}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-finance} -d ${POSTGRES_DB:-finance}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7
    ports:
      - "${REDIS_HOST_PORT:-6380}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  auth-service:
    <<: *service-defaults
    env_file:
      - ../.env
      - ../env/auth-service.env
    build:
      context: ..
      dockerfile: deploy/docker/service.Dockerfile
      args:
        SERVICE: auth-service
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "${AUTH_SERVICE_PORT:-8081}:8081"
    environment:
      <<: *runtime-env
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      REDIS_ADDR: redis:6379
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/healthz >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  mongodb:
    image: mongo:7
    ports:
      - "${MONGODB_HOST_PORT:-27017}:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval \"db.adminCommand('ping').ok\" | grep 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "${RABBITMQ_HOST_PORT:-5673}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15673}:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  kafka:
    image: apache/kafka:3.9.2
    ports:
      - "${KAFKA_HOST_PORT:-9092}:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s

  ingest-service:
    <<: *service-defaults
    env_file:
      - ../.env
      - ../env/ingest-service.env
    build:
      context: ..
      dockerfile: deploy/docker/service.Dockerfile
      args:
        SERVICE: ingest-service
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "${INGEST_SERVICE_PORT:-8082}:8082"
    environment:
      <<: *runtime-env
      MONGO_URI: mongodb://mongodb:27017
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      KAFKA_BROKERS: kafka:9092
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/healthz >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  parser-service:
    <<: *service-defaults
    env_file:
      - ../.env
      - ../env/parser-service.env
    build:
      context: ..
      dockerfile: deploy/docker/service.Dockerfile
      args:
        SERVICE: parser-service
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "${PARSER_SERVICE_PORT:-8083}:8083"
    environment:
      <<: *runtime-env
      MONGO_URI: mongodb://mongodb:27017
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      KAFKA_BROKERS: kafka:9092
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/healthz >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  ledger-service:
    <<: *service-defaults
    env_file:
      - ../.env
      - ../env/ledger-service.env
    build:
      context: ..
      dockerfile: deploy/docker/service.Dockerfile
      args:
        SERVICE: ledger-service
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "${LEDGER_SERVICE_PORT:-8084}:8084"
    environment:
      <<: *runtime-env
      POSTGRES_DSN: postgres://${POSTGRES_USER:-finance}:${POSTGRES_PASSWORD:-finance}@postgres:5432/${POSTGRES_DB:-finance}?sslmode=disable
      MONGO_URI: mongodb://mongodb:27017
      KAFKA_BROKERS: kafka:9092
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8084/healthz >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  rule-engine:
    <<: *service-defaults
    env_file:
      - ../.env
      - ../env/rule-engine.env
    build:
      context: ..
      dockerfile: deploy/docker/service.Dockerfile
      args:
        SERVICE: rule-engine
    depends_on:
      kafka:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${RULE_ENGINE_PORT:-8085}:8085"
    environment:
      <<: *runtime-env
      KAFKA_BROKERS: kafka:9092
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      REDIS_ADDR: redis:6379
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8085/healthz >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  notification-service:
    <<: *service-defaults
    env_file:
      - ../.env
      - ../env/notification-service.env
    build:
      context: ..
      dockerfile: deploy/docker/service.Dockerfile
      args:
        SERVICE: notification-service
    depends_on:
      auth-service:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${NOTIFICATION_SERVICE_PORT:-8086}:8086"
    environment:
      <<: *runtime-env
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      REDIS_ADDR: redis:6379
      AUTH_SERVICE_URL: http://auth-service:8081
      INGEST_SERVICE_URL: http://ingest-service:8082
      PARSER_SERVICE_URL: http://parser-service:8083
      ANALYTICS_SERVICE_URL: http://analytics-writer:8087
      LEDGER_SERVICE_URL: http://ledger-service:8084
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8086/healthz >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-finance}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-finance}
    ports:
      - "${CLICKHOUSE_HTTP_PORT:-8123}:8123"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8123/ping | grep Ok."]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  migrate:
    <<: *service-defaults
    restart: "no"
    env_file:
      - ../.env
      - ../env/migrate.env
    build:
      context: ..
      dockerfile: deploy/docker/service.Dockerfile
      args:
        SERVICE: migrate
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    environment:
      <<: *runtime-env
      POSTGRES_DSN: postgres://${POSTGRES_USER:-finance}:${POSTGRES_PASSWORD:-finance}@postgres:5432/${POSTGRES_DB:-finance}?sslmode=disable
      CLICKHOUSE_DSN: http://${CLICKHOUSE_USER:-finance}:${CLICKHOUSE_PASSWORD:-finance}@clickhouse:8123
      CLICKHOUSE_DATABASE: ${CLICKHOUSE_DATABASE:-finance_os}

  sensitive-data-maintenance:
    <<: *service-defaults
    restart: "no"
    env_file:
      - ../.env
      - ../env/sensitive-data-maintenance.env
    build:
      context: ..
      dockerfile: deploy/docker/service.Dockerfile
      args:
        SERVICE: sensitive-data-maintenance
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    environment:
      <<: *runtime-env
      POSTGRES_DSN: postgres://${POSTGRES_USER:-finance}:${POSTGRES_PASSWORD:-finance}@postgres:5432/${POSTGRES_DB:-finance}?sslmode=disable
      MONGO_URI: mongodb://mongodb:27017
      MONGO_DATABASE: ${MONGO_DATABASE:-finance_os}
      MONGO_RAW_COLLECTION: ${MONGO_RAW_COLLECTION:-raw_imports}
      MONGO_PARSED_COLLECTION: ${MONGO_PARSED_COLLECTION:-parsed_imports}

  analytics-writer:
    <<: *service-defaults
    env_file:
      - ../.env
      - ../env/analytics-writer.env
    build:
      context: ..
      dockerfile: deploy/docker/service.Dockerfile
      args:
        SERVICE: analytics-writer
    depends_on:
      clickhouse:
        condition: service_healthy
      kafka:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "${ANALYTICS_WRITER_PORT:-8087}:8087"
    environment:
      <<: *runtime-env
      CLICKHOUSE_DSN: http://${CLICKHOUSE_USER:-finance}:${CLICKHOUSE_PASSWORD:-finance}@clickhouse:8123
      KAFKA_BROKERS: kafka:9092
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8087/healthz >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  realtime-gateway:
    <<: *service-defaults
    env_file:
      - ../.env
      - ../env/realtime-gateway.env
    build:
      context: ..
      dockerfile: deploy/docker/service.Dockerfile
      args:
        SERVICE: realtime-gateway
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${REALTIME_GATEWAY_PORT:-8088}:8088"
    environment:
      <<: *runtime-env
      REDIS_ADDR: redis:6379
      KAFKA_BROKERS: kafka:9092
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8088/healthz >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  api-gateway:
    <<: *service-defaults
    env_file:
      - ../.env
      - ../env/api-gateway.env
    build:
      context: ..
      dockerfile: deploy/docker/service.Dockerfile
      args:
        SERVICE: api-gateway
    depends_on:
      auth-service:
        condition: service_healthy
      ingest-service:
        condition: service_healthy
      parser-service:
        condition: service_healthy
      ledger-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
      analytics-writer:
        condition: service_healthy
      realtime-gateway:
        condition: service_healthy
    ports:
      - "${API_GATEWAY_PORT:-8080}:8080"
    environment:
      <<: *runtime-env
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      AUTH_SERVICE_URL: http://auth-service:8081
      INGEST_SERVICE_URL: http://ingest-service:8082
      PARSER_SERVICE_URL: http://parser-service:8083
      LEDGER_SERVICE_URL: http://ledger-service:8084
      NOTIFICATION_SERVICE_URL: http://notification-service:8086
      ANALYTICS_SERVICE_URL: http://analytics-writer:8087
      REALTIME_SERVICE_URL: http://realtime-gateway:8088
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  prometheus:
    image: prom/prometheus:v2.53.1
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:11.1.0
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data:/var/lib/grafana

volumes:
  postgres-data:
  mongo-data:
  clickhouse-data:
  grafana-data:
