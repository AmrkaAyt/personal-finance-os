services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: finance
      POSTGRES_USER: finance
      POSTGRES_PASSWORD: finance
    ports:
      - "5434:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6380:6379"

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval \"db.adminCommand('ping').ok\" | grep 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5673:5672"
      - "15673:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  kafka:
    image: apache/kafka:3.9.2
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s

  ingest-service:
    build:
      context: ..
      dockerfile: deploy/docker/service.Dockerfile
      args:
        SERVICE: ingest-service
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8082:8082"
    restart: unless-stopped
    environment:
      HTTP_ADDR: ":8082"
      MONGO_URI: mongodb://mongodb:27017
      MONGO_DATABASE: finance_os
      MONGO_RAW_COLLECTION: raw_imports
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      RABBIT_PARSE_QUEUE: parse.statement
      KAFKA_BROKERS: kafka:9092
      KAFKA_IMPORT_TOPIC: statement.uploaded
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/healthz >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  parser-service:
    build:
      context: ..
      dockerfile: deploy/docker/service.Dockerfile
      args:
        SERVICE: parser-service
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8083:8083"
    restart: unless-stopped
    environment:
      HTTP_ADDR: ":8083"
      MONGO_URI: mongodb://mongodb:27017
      MONGO_DATABASE: finance_os
      MONGO_RAW_COLLECTION: raw_imports
      MONGO_PARSED_COLLECTION: parsed_imports
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      RABBIT_PARSE_QUEUE: parse.statement
      KAFKA_BROKERS: kafka:9092
      KAFKA_PARSED_TOPIC: statement.parsed
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/healthz >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse

  prometheus:
    image: prom/prometheus:v2.53.1
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:11.1.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data:/var/lib/grafana

volumes:
  postgres-data:
  mongo-data:
  clickhouse-data:
  grafana-data:
