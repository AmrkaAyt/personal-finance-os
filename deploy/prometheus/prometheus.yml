global:
  scrape_interval: 15s

scrape_configs:
  - job_name: api-gateway
    static_configs:
      - targets: ['host.docker.internal:8080']
  - job_name: auth-service
    static_configs:
      - targets: ['host.docker.internal:8081']
  - job_name: ingest-service
    static_configs:
      - targets: ['ingest-service:8082']
  - job_name: parser-service
    static_configs:
      - targets: ['parser-service:8083']
  - job_name: ledger-service
    static_configs:
      - targets: ['host.docker.internal:8084']
  - job_name: rule-engine
    static_configs:
      - targets: ['host.docker.internal:8085']
  - job_name: notification-service
    static_configs:
      - targets: ['host.docker.internal:8086']
  - job_name: analytics-writer
    static_configs:
      - targets: ['host.docker.internal:8087']
  - job_name: realtime-gateway
    static_configs:
      - targets: ['host.docker.internal:8088']
